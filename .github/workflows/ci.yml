name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  host-tests:
    name: Host vector tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No downloadable deps to cache; ccache caches compiler output, which
      # grows worthwhile as the crypto implementations land (Phases 1-2).
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: host-tests
      - name: Build and run tests
        run: make test CC="ccache cc"
      - name: Build native CLI
        run: make cli CC="ccache cc"

  m68k-build:
    name: m68k Amiga build
    runs-on: ubuntu-latest
    container: stefanreinauer/amiga-gcc:latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: m68k-build
      - name: Cross-build CLI for 68000
        run: PATH="/opt/amiga/bin:$PATH" make m68k M68K_CC="ccache m68k-amigaos-gcc"
