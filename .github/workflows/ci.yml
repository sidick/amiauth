name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    name: Host vector tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and run tests
        run: make test
      - name: Build native CLI
        run: make cli
      - name: CLI smoke test
        run: make smoke

  differential:
    name: Differential fuzz (vs OpenSSL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Fuzz crypto primitives against OpenSSL
        run: make diff DIFF_ITERS=20000

  m68k-build:
    name: m68k Amiga build
    runs-on: ubuntu-latest
    # Slower job (container pull): only on PRs and post-merge on main, not on
    # every feature-branch change. Host tests are the fast per-push signal.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    container: stefanreinauer/amiga-gcc:latest
    steps:
      - uses: actions/checkout@v7
      - name: Cross-build CLI for 68000
        run: PATH="/opt/amiga/bin:$PATH" make m68k M68K_CC=m68k-amigaos-gcc

  copperline-smoke:
    name: Copperline on-target smoke test (AROS)
    runs-on: ubuntu-latest
    # Slower job (builds Copperline from source); gate like the m68k build.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      # Pin Copperline for reproducible builds; bump to adopt upstream changes.
      COPPERLINE_REF: 8a1ae27569672d89bb37cc27d789ec49bb150ca9
    steps:
      - uses: actions/checkout@v7

      # Copperline ships the emulator and a redistributable AROS Kickstart
      # replacement (assets/aros), so no licensed ROM is needed.
      - name: Check out Copperline
        uses: actions/checkout@v7
        with:
          repository: LinuxJedi/Copperline
          ref: ${{ env.COPPERLINE_REF }}
          path: copperline

      # libasound2-dev/libudev-dev: build deps (cpal, gilrs). mesa-vulkan-drivers:
      # software Vulkan, in case the emulator initialises wgpu at start-up (the
      # test runs windowless via --benchmark-until; drop if it proves unneeded).
      - name: Install Copperline build/runtime deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config mesa-vulkan-drivers

      - name: Cache cargo + Copperline build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            copperline/target
          key: copperline-${{ runner.os }}-${{ env.COPPERLINE_REF }}

      - name: Build Copperline
        run: cargo build --release --manifest-path copperline/Cargo.toml --bin copperline

      - name: Add copperline to PATH
        run: echo "$GITHUB_WORKSPACE/copperline/target/release" >> "$GITHUB_PATH"

      # No KICK set -> run.sh boots the bundled AROS; COPPERLINE_AROS_DIR points
      # the from-source binary at Copperline's AROS blobs.
      - name: On-target smoke test
        env:
          COPPERLINE_AROS_DIR: ${{ github.workspace }}/copperline/assets/aros
        run: make copperline-smoke
