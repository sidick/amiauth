name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    name: Host vector tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and run tests
        run: make test
      - name: Build native CLI
        run: make cli
      - name: CLI smoke test
        run: make smoke

  differential:
    name: Differential fuzz (vs OpenSSL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Fuzz crypto primitives against OpenSSL
        run: make diff DIFF_ITERS=20000

  m68k-build:
    name: m68k Amiga build
    runs-on: ubuntu-latest
    # Slower job (container pull): only on PRs and post-merge on main, not on
    # every feature-branch change. Host tests are the fast per-push signal.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    container: stefanreinauer/amiga-gcc:latest
    steps:
      - uses: actions/checkout@v7
      - name: Cross-build CLI for 68000
        run: PATH="/opt/amiga/bin:$PATH" make m68k M68K_CC=m68k-amigaos-gcc

  # TODO (future): on-target smoke test under the Copperline emulator
  # (`make copperline-smoke`, see tests/copperline/). It boots a stock 68000
  # headless and checks the RFC 4226 vectors emitted over serial. Working
  # locally, but left out of CI for now because the runner would need:
  #   - a Copperline build (Rust; not packaged), and
  #   - a 512 KiB Kickstart 3.1 ROM, which is non-redistributable (would need a
  #     licensed ROM provisioned via secrets, e.g. Cloanto/Amiga Forever).
  # copperline-smoke:
  #   name: Copperline on-target smoke test
  #   runs-on: ubuntu-latest
  #   steps: ...
